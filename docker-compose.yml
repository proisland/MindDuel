services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: mindduel
      POSTGRES_USER: mindduel
      POSTGRES_PASSWORD: mindduel
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mindduel"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: mindduel
      MINIO_ROOT_PASSWORD: mindduel123
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./backend
      target: dev
    environment:
      DATABASE_URL: postgresql://mindduel:mindduel@postgres:5432/mindduel
      REDIS_URL: redis://redis:6379
      S3_ENDPOINT: http://minio:9000
      S3_BUCKET: mindduel
      S3_ACCESS_KEY: mindduel
      S3_SECRET_KEY: mindduel123
      S3_REGION: us-east-1
      JWT_SECRET: dev-secret-change-in-production
      APPLE_CLIENT_ID: no.mindduel.app
      PORT: "3000"
      NODE_ENV: development
    ports:
      - "3000:3000"
    volumes:
      - ./backend/src:/app/src
      - ./backend/views:/app/views
      - ./backend/prisma:/app/prisma
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_started

volumes:
  postgres_data:
  redis_data:
  minio_data:

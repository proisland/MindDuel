name: Backend CI

on:
  push:
    branches: [main, "milestone/**"]
    paths:
      - "backend/**"
      - "docker-compose.yml"
      - ".github/workflows/backend.yml"
  pull_request:
    branches: [main]
    paths:
      - "backend/**"

jobs:
  build-and-test:
    name: Build & lint
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: mindduel_test
          POSTGRES_USER: mindduel
          POSTGRES_PASSWORD: mindduel
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Type check
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Run migrations
        env:
          DATABASE_URL: postgresql://mindduel:mindduel@localhost:5432/mindduel_test
        run: npx prisma migrate deploy

  deploy-staging:
    name: Deploy to staging
    needs: build-and-test
    runs-on: ubuntu-latest
    if: (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/heads/milestone/')) && github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4

      - name: Deploy to Railway (staging)
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
          RAILWAY_PROJECT_ID: ${{ secrets.RAILWAY_PROJECT_ID }}
        run: |
          npm install -g @railway/cli
          railway --version
          railway whoami || true
          railway up --service mindduel-api --environment staging --detach

    env:
      DATABASE_URL: postgresql://mindduel:mindduel@localhost:5432/mindduel_test
      REDIS_URL: redis://localhost:6379
      S3_ENDPOINT: http://localhost:9000
      S3_BUCKET: mindduel
      S3_ACCESS_KEY: mindduel
      S3_SECRET_KEY: mindduel123
      JWT_SECRET: ci-test-secret
      APPLE_CLIENT_ID: no.mindduel.app
